kind = "web"
previewPath = "/"
title = "Ching Chong Restaurant"
version = "1.0.0"
id = "artifacts/ching-chong"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18123

[services.development]
run = "pnpm --filter @workspace/ching-chong run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ching-chong", "run", "build" ]
publicDir = "artifacts/ching-chong/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18123"
BASE_PATH = "/"
